<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <title>Admin Dashboard</title>
</head>
<body class="">
    <div class="admin-container">
        <div class="admin-header">
            <h1><span class="colored">Admin</span> Dashboard</h1>
            <button class="refresh-btn" onclick="loadMessages()">
                <ion-icon name="refresh-outline"></ion-icon> Rafraîchir
            </button>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-box">
                <h3>Total Messages</h3>
                <div class="number" id="totalCount">0</div>
            </div>
            <div class="stat-box">
                <h3>Non Lus</h3>
                <div class="number" id="unreadCount">0</div>
            </div>
            <div class="stat-box">
                <h3>Lus</h3>
                <div class="number" id="readCount">0</div>
            </div>
        </div>

        <!-- Messages Section -->
        <div class="messages-section">
            <h2>
                <ion-icon name="mail-outline"></ion-icon>
                Messages des Clients
            </h2>
            
            <div id="messagesContainer" class="messages-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des messages...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
